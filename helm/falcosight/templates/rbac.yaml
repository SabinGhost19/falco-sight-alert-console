apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-backend-sa
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-backend-role
rules:
# Backend K8s Correlator needs read access to pods & deployments globally
- apiGroups: ["", "apps"]
  resources: ["pods", "deployments", "daemonsets", "statefulsets", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-backend-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-backend-role
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-backend-sa
  namespace: {{ .Release.Namespace }}
