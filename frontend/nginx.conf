server {
    listen 80;
    server_name localhost;

    # Proxy pass request-urile spre backend-ul din Kubernetes
    # Presupunem că Serviciul se numește falcosight-backend și ascultă pe 3000.
    location /api/ {
        proxy_pass http://falcosight-backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Redirecționează toate request-urile necunoscute către index.html (necesar pentru Vue Router)
        try_files $uri $uri/ /index.html;
    }

    # Opțional: evită logarea erorilor pentru favicon și robots
    location = /favicon.ico { log_not_found off; access_log off; }
    location = /robots.txt  { log_not_found off; access_log off; }
}
